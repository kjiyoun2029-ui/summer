<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Until We Meet Again</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Caveat:wght@400;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  background:
  linear-gradient(rgba(120,85,50,0.15), rgba(120,85,50,0.15)),
  #c8ab88;

  font-family:'Cormorant Garamond', serif;
  overflow:hidden;

  display:flex;
  justify-content:center;
  align-items:center;

  position:relative;
}

.petal{
  position:absolute;
  top:-10vh;
  font-size:18px;
  opacity:0.6;
  pointer-events:none;
  animation: fall linear forwards;
  color:#fff3e6;
}

@keyframes fall{
  0%{
    transform:translateY(-10vh) translateX(0) rotate(0deg);
  }
  100%{
    transform:translateY(110vh) translateX(40px) rotate(360deg);
  }
}

body::before{
  content:"";
  position:absolute;
  inset:0;
  background-image: radial-gradient(rgba(255,255,255,0.08) 1px, transparent 1px);
  background-size:4px 4px;
  opacity:0.4;
  pointer-events:none;
}

.paper{
  position:relative;
  width:90%;
  max-width:850px;
  background:#efe3cf;
  padding:70px 50px;
  box-shadow:0 15px 40px rgba(0,0,0,0.25);
  transform:rotate(-1deg);
  border-radius:2px;
  z-index:2;
}

.paper::before,
.paper::after{
  content:"";
  position:absolute;
  left:0;
  width:100%;
  height:20px;
  background:repeating-linear-gradient(
    -45deg,
    #e8d7be,
    #e8d7be 8px,
    #efe3cf 8px,
    #efe3cf 16px
  );
}

.paper::before{ top:-12px; }
.paper::after{ bottom:-12px; }

h1{
  text-align:center;
  font-size:4rem;
  color:#5c3b22;
}

.small{
  text-align:center;
  font-family:'Caveat', cursive;
  color:#7b5b40;
  font-size:2rem;
}

.line{
  width:180px;
  height:1px;
  background:#7b5b40;
  margin:25px auto;
  opacity:0.5;
}

#countdown{
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
  margin-top:40px;
}

.box{
  width:130px;
  height:130px;
  background:#e7d3b7;
  border:1px solid rgba(92,59,34,0.2);
  box-shadow:5px 5px 15px rgba(0,0,0,0.08);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.num{
  font-size:3rem;
  color:#5c3b22;
  font-weight:600;
}

.label{
  font-size:1rem;
  letter-spacing:2px;
  text-transform:lowercase;
  color:#7b5b40;
}

.footer{
  margin-top:50px;
  text-align:center;
  color:#6f5138;
  font-size:1.4rem;
  font-family:'Caveat', cursive;
}

.petal{
  position:absolute;
  top:-10vh;
  font-size:18px;
  opacity:0.6;
  pointer-events:none;
  animation: fall linear forwards;
}

@keyframes fall{
  0%{ transform:translateY(-10vh) translateX(0) rotate(0deg); }
  100%{ transform:translateY(110vh) translateX(40px) rotate(360deg); }
}

@media(max-width:700px){
  h1{ font-size:3rem; }
  .box{ width:110px; height:110px; }
  .num{ font-size:2.3rem; }
  .paper{ padding:50px 25px; }
}
</style>
</head>

<body>

<div class="paper">

  <div class="small">counting down until</div>
  <h1>we meet again</h1>
  <div class="line"></div>

  <div id="countdown">
    <div class="box"><div class="num" id="days">0</div><div class="label">days</div></div>
    <div class="box"><div class="num" id="hours">0</div><div class="label">hours</div></div>
    <div class="box"><div class="num" id="minutes">0</div><div class="label">minutes</div></div>
    <div class="box"><div class="num" id="seconds">0</div><div class="label">seconds</div></div>
  </div>

  <div class="footer">
    distance means so little when someone means so much ♡
  </div>

</div>

<script>

const reunionDate = new Date("August 30, 2026 20:00:00");

function updateCountdown(){
  const now = new Date().getTime();
  const distance = reunionDate - now;

  if(distance <= 0){
    document.getElementById("countdown").innerHTML =
    "<h2 style='color:#5c3b22;'>together again ♡</h2>";
    return;
  }

  document.getElementById("days").innerText =
    Math.floor(distance / (1000*60*60*24));

  document.getElementById("hours").innerText =
    Math.floor((distance / (1000*60*60)) % 24);

  document.getElementById("minutes").innerText =
    Math.floor((distance / (1000*60)) % 60);

  document.getElementById("seconds").innerText =
    Math.floor((distance / 1000) % 60);
}

setInterval(updateCountdown,1000);
updateCountdown();

const petals = ["❀","✿","❁","❦"];

function createPetal(){
  const petal = document.createElement("div");
  petal.classList.add("petal");

  petal.innerText = petals[Math.floor(Math.random()*petals.length)];

  petal.style.left = Math.random() * 100 + "vw";
  petal.style.fontSize = (12 + Math.random()*18) + "px";
  petal.style.animationDuration = (5 + Math.random()*6) + "s";
  petal.style.opacity = (0.3 + Math.random()*0.5);

  document.body.appendChild(petal);

  setTimeout(() => petal.remove(), 12000);
}

setInterval(createPetal, 300);

</script>

</body>
</html>
